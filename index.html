<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agente SDR — Legit.health</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f1a; color: #e2e8f0; min-height: 100vh; padding: 32px 20px; }
    .wrap { max-width: 640px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    .logo { width: 36px; height: 36px; border-radius: 8px; background: linear-gradient(135deg, #0ea5e9, #6366f1); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    h1 { font-size: 20px; font-weight: 600; }
    .badge { background: #0c2a3a; color: #38bdf8; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; border: 1px solid #0ea5e9; }
    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }
    .card { background: #16162a; border: 1px solid #2a2a4a; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    label { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; font-weight: 500; }
    input, textarea { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 14px; outline: none; font-family: inherit; width: 100%; }
    input::placeholder, textarea::placeholder { color: #4a5568; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .mb { margin-bottom: 14px; }
    .row { display: flex; gap: 8px; }
    .row input { flex: 1; }
    button { background: #0ea5e9; color: white; border: none; border-radius: 8px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s; }
    button:hover { background: #0284c7; }
    button:disabled { background: #2a2a4a; color: #4a5568; cursor: default; }
    .btn-full { width: 100%; padding: 13px; font-size: 15px; margin-top: 6px; }
    .btn-sm { font-size: 12px; padding: 4px 12px; background: #1a1a2e; border: 1px solid #2a2a4a; color: #94a3b8; border-radius: 6px; }
    .btn-sm:hover { background: #2a2a4a; }
    .btn-sm.copied { background: #065f46; color: #6ee7b7; border-color: #065f46; }
    .error { color: #f87171; font-size: 13px; margin-top: 10px; text-align: center; display: none; }
    .success { color: #6ee7b7; font-size: 12px; margin-top: 8px; display: none; }
    .result-card { background: #16162a; border: 1px solid #2a2a4a; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .result-label { font-size: 11px; color: #0ea5e9; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .info-box { background: #1a1a2e; border-radius: 8px; padding: 10px; }
    .info-box.full { grid-column: 1/-1; }
    .info-key { font-size: 11px; color: #64748b; margin-bottom: 4px; }
    .info-val { font-size: 13px; color: #e2e8f0; }
    .msg-subject { background: #1a1a2e; border-radius: 8px; padding: 10px; font-size: 13px; margin-bottom: 8px; }
    .msg-subject span:first-child { color: #64748b; }
    .msg-body { background: #1a1a2e; border-radius: 8px; padding: 14px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; color: #e2e8f0; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    #results { display: none; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">🩺</div>
    <h1>Agente SDR</h1>
    <span class="badge">Legit.health</span>
  </div>
  <p class="subtitle">Genera mensajes de prospección personalizados para clínicas y hospitales.</p>

  <div class="card">
    <label>API Key de Groq (gratis en console.groq.com)</label>
    <div class="row">
      <input type="password" id="apikey" placeholder="gsk_..." />
      <button onclick="activar()">Activar</button>
    </div>
    <div class="error" id="apierr"></div>
    <div class="success" id="apiok">✓ API key activada correctamente</div>
  </div>

  <div class="card" id="form" style="opacity:.4;pointer-events:none;">
    <div class="grid2">
      <div>
        <label>Clínica u hospital *</label>
        <input id="empresa" placeholder="ej. Clínica Teknon..." />
      </div>
      <div>
        <label>Ciudad / País</label>
        <input id="sector" placeholder="ej. Barcelona, Madrid..." />
      </div>
    </div>
    <div class="mb">
      <label>Tamaño aproximado</label>
      <input id="empleados" placeholder="ej. clínica pequeña, hospital grande..." style="width:60%;" />
    </div>
    <div class="mb">
      <label>Contexto adicional (opcional)</label>
      <textarea id="contexto" rows="3" placeholder="ej. tienen servicio de dermatología, han abierto nueva sede, aparecen en prensa..."></textarea>
    </div>
    <button class="btn-full" id="genbtn" onclick="generar()">⚡ Generar mensaje de prospección</button>
    <div class="error" id="generr"></div>
  </div>

  <div id="results"></div>
</div>

<script>
let GROQ_KEY = '';

const SYSTEM = `Eres el agente SDR de Legit.health, empresa que fabrica el mejor dispositivo médico de análisis de piel del mundo.

PRODUCTO:
Legit.health es un dispositivo médico con IA que analiza lesiones cutáneas usando biomarcadores avanzados. Ayuda a dermatólogos y médicos a diagnosticar con más precisión, reducir errores diagnósticos, optimizar el tiempo de consulta y ofrecer a los pacientes informes objetivos y visuales de su estado de piel.

CLIENTES IDEALES:
- Clínicas dermatológicas privadas
- Hospitales con servicio de dermatología
- Clínicas de medicina estética con dermatología
- Seguros médicos privados
- Centros de atención primaria con alto volumen

DOLORES REALES QUE RESUELVE:
- Diagnósticos subjetivos que dependen de la experiencia del médico
- Tiempo excesivo en consulta para evaluar lesiones complejas
- Pacientes que no entienden su diagnóstico y no siguen el tratamiento
- Dificultad para demostrar la evolución del tratamiento de forma objetiva
- Médicos jóvenes con menos experiencia que necesitan apoyo diagnóstico
- Falta de diferenciación frente a otras clínicas de la competencia

CÓMO ESCRIBIR EL MENSAJE:
- Máximo 4-5 líneas, nunca más
- Empieza mencionando algo específico de esa clínica u hospital
- Conecta con UN dolor concreto y relevante para ese tipo de centro
- Presenta Legit.health como la solución de forma natural, no vendedora
- Termina con UNA pregunta cerrada fácil de responder
- Tono: directo, humano, de igual a igual, nunca corporativo ni genérico

EJEMPLO DE MENSAJE BUENO:
"Vi que la Clínica Dermatológica X ha expandido su equipo este año. Cuando los centros crecen rápido, mantener la consistencia diagnóstica entre médicos senior y junior suele ser el mayor reto. Nosotros trabajamos con clínicas como la vuestra para estandarizar el análisis de lesiones con biomarcadores, reduciendo la variabilidad entre médicos. ¿Tendría sentido hablar 20 minutos esta semana?"

EJEMPLO DE MENSAJE MALO (nunca hagas esto):
"Hola, me llamo X y trabajo en Legit.health. Nos dedicamos al análisis de piel con IA. ¿Les interesaría conocer nuestra solución?"

Responde ÚNICAMENTE con JSON válido sin backticks ni texto adicional:
{"pain_point":"dolor específico identificado para este centro","decisor":"cargo exacto al que dirigirse","asunto_email":"asunto del email (máx 8 palabras, específico)","mensaje_email":"mensaje completo de email","mensaje_linkedin":"versión ultra corta para LinkedIn máximo 3 líneas"}`;

function activar() {
  const key = document.getElementById('apikey').value.trim();
  const err = document.getElementById('apierr');
  const ok = document.getElementById('apiok');
  if (!key.startsWith('gsk_')) {
    err.style.display = 'block';
    err.textContent = 'La key debe empezar por gsk_ — cópiala bien desde Groq';
    return;
  }
  GROQ_KEY = key;
  err.style.display = 'none';
  ok.style.display = 'block';
  const form = document.getElementById('form');
  form.style.opacity = '1';
  form.style.pointerEvents = 'auto';
}

async function generar() {
  const empresa = document.getElementById('empresa').value.trim();
  if (!empresa || !GROQ_KEY) return;
  const ciudad = document.getElementById('sector').value.trim();
  const tamano = document.getElementById('empleados').value.trim();
  const contexto = document.getElementById('contexto').value.trim();
  const btn = document.getElementById('genbtn');
  const err = document.getElementById('generr');
  const results = document.getElementById('results');

  btn.textContent = '⚡ Generando mensaje...';
  btn.disabled = true;
  err.style.display = 'none';
  results.style.display = 'none';

  const prompt = `Centro médico: ${empresa}
Ciudad/País: ${ciudad || 'desconocido'}
Tamaño: ${tamano || 'desconocido'}
Contexto: ${contexto || 'ninguno'}

Genera el mensaje de prospección para este centro.`;

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 800,
        temperature: 0.7,
        messages: [{ role: 'system', content: SYSTEM }, { role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    mostrar(empresa, parsed);
  } catch(e) {
    err.style.display = 'block';
    err.textContent = 'Error al generar. Revisa tu API key o inténtalo de nuevo.';
  } finally {
    btn.textContent = '⚡ Generar mensaje de prospección';
    btn.disabled = false;
  }
}

function copiar(id, btnId) {
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  const b = document.getElementById(btnId);
  b.classList.add('copied');
  b.textContent = '✓ Copiado';
  setTimeout(() => { b.classList.remove('copied'); b.textContent = 'Copiar'; }, 2000);
}

function mostrar(empresa, d) {
  const results = document.getElementById('results');
  results.style.display = 'block';
  results.innerHTML = `
    <div class="result-card">
      <div class="result-label">Análisis — ${empresa}</div>
      <div class="info-grid">
        <div class="info-box"><div class="info-key">Decisor ideal</div><div class="info-val">${d.decisor}</div></div>
        <div class="info-box full"><div class="info-key">Pain point identificado</div><div class="info-val">${d.pain_point}</div></div>
      </div>
    </div>
    <div class="result-card">
      <div class="card-header">
        <div class="result-label" style="margin:0;">Email</div>
        <button class="btn-sm" id="btn-email" onclick="copiar('email-body','btn-email')">Copiar</button>
      </div>
      <div class="msg-subject"><span>Asunto: </span><span>${d.asunto_email}</span></div>
      <div class="msg-body" id="email-body">${d.mensaje_email}</div>
    </div>
    <div class="result-card">
      <div class="card-header">
        <div class="result-label" style="margin:0;">LinkedIn</div>
        <button class="btn-sm" id="btn-linkedin" onclick="copiar('linkedin-body','btn-linkedin')">Copiar</button>
      </div>
      <div class="msg-body" id="linkedin-body">${d.mensaje_linkedin}</div>
    </div>`;
  results.scrollIntoView({ behavior: 'smooth' });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && GROQ_KEY && document.getElementById('empresa').value.trim()) generar();
});
</script>
</body>
</html>
